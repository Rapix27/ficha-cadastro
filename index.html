<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Comissão</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div class="calculadora-container">
        <h2>Calculadora de Comissão</h2>
        
        <div class="form-group">
            <label for="valorVenda">Valor Total da Venda (R$):</label>
            <input type="number" id="valorVenda" placeholder="Ex: 1000">
        </div>

        <div class="form-group">
            <label for="porcentagem">Porcentagem da Comissão (%):</label>
            <input type="number" id="porcentagem" placeholder="Ex: 5">
        </div>

        <button id="btnCalcular">Calcular</button>

        <div id="resultado"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
